# Render Blueprint — Plataforma de Gestão JUST (deploy zero-custo).
#
# Fase 3 (backend): UM web service (free) roda o gateway, que sobe os 6 backends Node em
# portas internas e roteia por path (/core, /eleva, /security, /train, /frota, /gate).
# Banco: Neon Postgres (free, persistente). Arquivos: SharePoint/Graph (Core).
#
# Os fronts (Vite estáticos) entram como static sites num passo seguinte — precisam de um
# base de API configurável no build (apontando para a URL deste gateway).
#
# Segredos (sync:false) são preenchidos no painel do Render, nunca versionados.

services:
  - type: web
    name: just-gateway
    runtime: node
    plan: free
    region: virginia # us-east — menor latência até o Neon sa-east-1 entre as regiões do Render
    rootDir: .
    # --include=dev garante tsx e o CLI do Prisma (usados em runtime/generate) mesmo se o
    # Render rodar o build com NODE_ENV=production.
    buildCommand: >-
      npm --prefix JustCore install --include=dev && npm --prefix JustCore run db:generate &&
      npm --prefix JustEleva/app install --include=dev && npm --prefix JustEleva/app run db:generate &&
      npm --prefix JustSecurity install --include=dev && npm --prefix JustSecurity run db:generate &&
      npm --prefix JustTrain install --include=dev && npm --prefix JustTrain run db:generate &&
      npm --prefix JustFrota install --include=dev && npm --prefix JustFrota run db:generate &&
      npm --prefix JustAtestados install --include=dev && npm --prefix JustAtestados run db:generate &&
      npm --prefix JustGate install --include=dev &&
      npm --prefix gateway install --include=dev
    startCommand: npm --prefix gateway start
    healthCheckPath: /health
    envVars:
      # Um banco Neon por app (connection string POOLED, sslmode=require).
      - key: DATABASE_URL_CORE
        sync: false
      - key: DATABASE_URL_ELEVA
        sync: false
      - key: DATABASE_URL_SECURITY
        sync: false
      - key: DATABASE_URL_TRAIN
        sync: false
      - key: DATABASE_URL_FROTA
        sync: false
      - key: DATABASE_URL_ATESTADOS
        sync: false
      # Arquivos (Core) — SharePoint / Microsoft Graph.
      - key: STORAGE_DRIVER
        value: sharepoint
      - key: SP_TENANT_ID
        sync: false
      - key: SP_CLIENT_ID
        sync: false
      - key: SP_CLIENT_SECRET
        sync: false
      - key: SP_SITE
        value: justconstrutora.sharepoint.com:/sites/PlataformaJust
      # E-mail transversal (M365 via Graph sendMail). Reusa a credencial SP_* acima.
      # Requer no M365: caixa compartilhada EMAIL_FROM + Mail.Send (App) + Application Access Policy.
      - key: EMAIL_DRIVER
        value: graph
      - key: EMAIL_FROM
        value: naoresponda@construtorajust.com.br
      # EMAIL_REPLY_TO opcional (responder-para padrão) — descomente e defina no dashboard se quiser.
      # - key: EMAIL_REPLY_TO
      #   sync: false
      # Triagem por IA (Gemini) — chave do Google AI Studio (AIza...). Ver server/triagem.ts.
      # LGPD: usar projeto/tier que NÃO treina com os dados (dado sensível de RH).
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      # Biometria (.NET no totem local) e match.
      - key: BIOMETRIA_URL
        sync: false
      - key: MATCH_THRESHOLD
        value: "40"
      # CONTROLE DE ACESSO (JWT). Ver skill `controle-acesso`.
      # JWT_SECRET: segredo forte, MESMO valor usado pelo Core p/ assinar/validar o token.
      # INTERNAL_TOKEN: segredo p/ chamadas servidor->servidor (apps -> Core).
      # AUTH_ENFORCE=true liga a obrigatoriedade de token nas rotas de dados do Core.
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_TOKEN
        sync: false
      - key: AUTH_ENFORCE
        value: "true"
      # WHATSAPP (JustGate, rota /gate). Ver skill `justgate-whatsapp`.
      # WA_VERIFY_TOKEN: string que você inventa; tem que bater com a do painel da Meta (webhook).
      # WA_PHONE_NUMBER_ID: "Phone number ID" do número (NÃO é o telefone). WA_TOKEN: token do
      # System User (permanente) em produção. Webhook: https://<gateway>/gate/webhook (campo messages).
      - key: WA_VERIFY_TOKEN
        sync: false
      - key: WA_PHONE_NUMBER_ID
        sync: false
      - key: WA_TOKEN
        sync: false
      - key: WA_API_VERSION
        value: v21.0

  # ----------------------------------------------------------------------------
  # Fase 3b — fronts (Vite estáticos). Cada um é um static site (grátis, sem spin-down).
  # VITE_GATEWAY (host do gateway, via fromService) + VITE_API_PREFIX fazem o interceptor
  # de fetch (src/api-base.ts) apontar /api e /core para o gateway. SPA fallback p/ index.html.
  # ----------------------------------------------------------------------------
  - type: web
    runtime: static
    name: just-core-web
    buildCommand: npm --prefix JustCore install --include=dev && npm --prefix JustCore run build
    staticPublishPath: JustCore/dist
    envVars:
      - key: VITE_GATEWAY
        fromService: { name: just-gateway, type: web, property: host }
      - key: VITE_API_PREFIX
        value: /core
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: just-eleva-web
    buildCommand: npm --prefix JustEleva/app install --include=dev && npm --prefix JustEleva/app run build
    staticPublishPath: JustEleva/app/dist
    envVars:
      - key: VITE_GATEWAY
        fromService: { name: just-gateway, type: web, property: host }
      - key: VITE_API_PREFIX
        value: /eleva
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: just-security-web
    buildCommand: npm --prefix JustSecurity install --include=dev && npm --prefix JustSecurity run build
    staticPublishPath: JustSecurity/dist
    envVars:
      - key: VITE_GATEWAY
        fromService: { name: just-gateway, type: web, property: host }
      - key: VITE_API_PREFIX
        value: /security
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: just-train-web
    buildCommand: npm --prefix JustTrain install --include=dev && npm --prefix JustTrain run build
    staticPublishPath: JustTrain/dist
    envVars:
      - key: VITE_GATEWAY
        fromService: { name: just-gateway, type: web, property: host }
      - key: VITE_API_PREFIX
        value: /train
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: just-frota-web
    buildCommand: npm --prefix JustFrota install --include=dev && npm --prefix JustFrota run build
    staticPublishPath: JustFrota/dist
    envVars:
      - key: VITE_GATEWAY
        fromService: { name: just-gateway, type: web, property: host }
      - key: VITE_API_PREFIX
        value: /frota
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: just-atestados-web
    buildCommand: npm --prefix JustAtestados install --include=dev && npm --prefix JustAtestados run build
    staticPublishPath: JustAtestados/dist
    envVars:
      - key: VITE_GATEWAY
        fromService: { name: just-gateway, type: web, property: host }
      - key: VITE_API_PREFIX
        value: /atestados
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: just-docs-web
    buildCommand: npm --prefix JustDocs install --include=dev && npm --prefix JustDocs run build
    staticPublishPath: JustDocs/dist
    envVars:
      - key: VITE_GATEWAY
        fromService: { name: just-gateway, type: web, property: host }
      - key: VITE_API_PREFIX
        value: /core
      # Ponte da Fila de Análise → app dono (ex.: "Finalizar no JustAtestados" abre ?ged=<docId>).
      - key: VITE_URL_ATESTADOS
        fromService: { name: just-atestados-web, type: web, property: host }
      - key: VITE_URL_TRAIN
        fromService: { name: just-train-web, type: web, property: host }
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # JustFVS — Fichas de Verificação de Serviço (front-only, consome o Core via /core).
  - type: web
    runtime: static
    name: just-fvs-web
    buildCommand: npm --prefix JustFVS install --include=dev && npm --prefix JustFVS run build
    staticPublishPath: JustFVS/dist
    envVars:
      - key: VITE_GATEWAY
        fromService: { name: just-gateway, type: web, property: host }
      - key: VITE_API_PREFIX
        value: /core
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Portal (Hub): linka os outros fronts (VITE_URL_*) e mostra status (VITE_GATEWAY).
  - type: web
    runtime: static
    name: just-hub
    buildCommand: npm --prefix JustHub install --include=dev && npm --prefix JustHub run build
    staticPublishPath: JustHub/dist
    envVars:
      - key: VITE_GATEWAY
        fromService: { name: just-gateway, type: web, property: host }
      - key: VITE_URL_CORE
        fromService: { name: just-core-web, type: web, property: host }
      - key: VITE_URL_ELEVA
        fromService: { name: just-eleva-web, type: web, property: host }
      - key: VITE_URL_SECURITY
        fromService: { name: just-security-web, type: web, property: host }
      - key: VITE_URL_TRAIN
        fromService: { name: just-train-web, type: web, property: host }
      - key: VITE_URL_FROTA
        fromService: { name: just-frota-web, type: web, property: host }
      - key: VITE_URL_ATESTADOS
        fromService: { name: just-atestados-web, type: web, property: host }
      - key: VITE_URL_DOCS
        fromService: { name: just-docs-web, type: web, property: host }
      - key: VITE_URL_FVS
        fromService: { name: just-fvs-web, type: web, property: host }
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
